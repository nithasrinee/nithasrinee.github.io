<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ค้นหาที่นั่งในงาน</title>

  <style>
    :root {
      --bg-1: #f8f5ef;
      --bg-2: #e8ddd2;
      --ink: #1f1b1a;
      --muted: #60564f;
      --accent: #b2894c;
      --accent-2: #8f6a35;
      --card: rgba(255, 255, 255, 0.78);
      --line: rgba(126, 97, 58, 0.25);
      --ok-bg: rgba(248, 241, 232, 0.95);
      --ok-bd: #c8a779;
      --err-bg: rgba(255, 240, 240, 0.95);
      --err-bd: #d49a9a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Kanit", "Noto Sans Thai", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(212, 178, 131, 0.32) 0%, transparent 40%),
        radial-gradient(circle at 82% 85%, rgba(158, 128, 80, 0.25) 0%, transparent 42%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 24px;
      box-shadow:
        0 18px 50px rgba(54, 38, 20, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);
      padding: 30px 24px 24px;
      animation: reveal 500ms ease-out both;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4.2vw, 2rem);
      letter-spacing: 0.3px;
      line-height: 1.2;
      text-align: center;
    }

    .subtitle {
      margin: 8px 0 22px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input {
      flex: 1;
      border: 1.6px solid #cdb8a1;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      background: rgba(255, 255, 255, 0.85);
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }

    input:focus {
      border-color: #b2894c;
      box-shadow: 0 0 0 4px rgba(178, 137, 76, 0.2);
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      min-width: 110px;
      font: inherit;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(111, 77, 37, 0.35);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .result {
      margin-top: 16px;
      min-height: 112px;
      border-radius: 16px;
      border: 1.5px solid var(--line);
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.62);
      line-height: 1.6;
      white-space: normal;
    }

    .result.ok {
      background: var(--ok-bg);
      border-color: var(--ok-bd);
    }

    .result.err {
      background: var(--err-bg);
      border-color: var(--err-bd);
    }

    .meta {
      margin-top: 16px;
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
    }

    .pill {
      display: inline-block;
      margin: 0 4px;
      padding: 2px 10px;
      border-radius: 999px;
      background: #f1e4d3;
      color: #654729;
      font-size: 0.84rem;
    }

    .table-wrap {
      margin-top: 8px;
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid rgba(126, 97, 58, 0.2);
      background: rgba(255, 255, 255, 0.8);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 420px;
    }

    th,
    td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(126, 97, 58, 0.2);
      font-size: 0.96rem;
    }

    th {
      font-weight: 600;
      color: #5e4425;
      background: rgba(236, 221, 201, 0.65);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .result-head {
      margin-bottom: 8px;
      color: #4f3a21;
      font-weight: 600;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      .card {
        padding: 22px 16px 18px;
        border-radius: 18px;
      }

      .search-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

          const nickname = columns[0];
          const table = columns[columns.length - 1];
          const type = columns.slice(1, -1).join(" ");
          return { nickname, type, table };
        }

        const fallbackMatch = line.match(/^(.*)\s+([^\s].*)\s+(\d+)$/);
        if (fallbackMatch) {
          const [, nickname, type, table] = fallbackMatch;
          return { nickname: nickname.trim(), type: type.trim(), table: table.trim() };
        }

        return null;
      })
      .filter(Boolean);

    const nameInput = document.getElementById("name");
    const result = document.getElementById("result");
    const searchBtn = document.getElementById("searchBtn");

    const normalize = (value) => value.trim().toLowerCase();

    function search() {
      const input = normalize(nameInput.value);

      if (!input) {
        result.className = "result err";
        result.textContent = "กรุณากรอกชื่อเล่นก่อนค้นหา";
        return;
      }

      const foundList = data.filter((x) => normalize(x.nickname).includes(input));

      if (foundList.length > 0) {
        result.className = "result ok";
        const rows = foundList
          .map(
            (item) => `
              <tr>
                <td>${item.nickname}</td>
                <td>${item.type}</td>
                <td>${item.table}</td>
              </tr>
            `
          )
          .join("");

        result.innerHTML = `
          <div class="result-head">พบข้อมูล ${foundList.length} รายการ</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nickname</th>
                  <th>Type</th>
                  <th>Table Number</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
              </tbody>
            </table>
          </div>
        `;
      } else {
        result.className = "result err";
        result.textContent = "ไม่พบข้อมูลที่ตรงกับคำค้นหา";
      }
    }

    searchBtn.addEventListener("click", search);
    nameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        search();
      }
    });
  </script>
</body>
</html>
