<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ค้นหาที่นั่งในงาน</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-1: #f8f5ef;
      --bg-2: #e8ddd2;
      --ink: #1f1b1a;
      --muted: #60564f;
      --accent: #b2894c;
      --accent-2: #8f6a35;
      --card: rgba(255, 255, 255, 0.78);
      --line: rgba(126, 97, 58, 0.25);
      --ok-bg: rgba(248, 241, 232, 0.95);
      --ok-bd: #c8a779;
      --err-bg: rgba(255, 240, 240, 0.95);
      --err-bd: #d49a9a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: clip;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Kanit", "Noto Sans Thai", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(212, 178, 131, 0.32) 0%, transparent 40%),
        radial-gradient(circle at 82% 85%, rgba(158, 128, 80, 0.25) 0%, transparent 42%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 760px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 24px;
      box-shadow:
        0 18px 50px rgba(54, 38, 20, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);
      padding: 56px 24px 24px;
      animation: reveal 500ms ease-out both;
    }

    .lang-toggle {
      position: absolute;
      top: 14px;
      right: 14px;
      min-width: 76px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      background: linear-gradient(135deg, #7e6038, #5d4528);
      box-shadow: 0 6px 14px rgba(61, 42, 19, 0.3);
    }

    h1 {
      margin: 0;
      width: 100%;
      font-size: clamp(1.5rem, 4.2vw, 2rem);
      letter-spacing: 0.3px;
      line-height: 1.2;
      text-align: center;
    }

    .subtitle {
      margin: 8px 0 22px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-row > * {
      min-width: 0;
    }

    input {
      flex: 1;
      border: 1.6px solid #cdb8a1;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      background: rgba(255, 255, 255, 0.85);
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }

    input:focus {
      border-color: #b2894c;
      box-shadow: 0 0 0 4px rgba(178, 137, 76, 0.2);
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      min-width: 110px;
      font: inherit;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(111, 77, 37, 0.35);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .result {
      margin-top: 16px;
      min-height: 112px;
      border-radius: 16px;
      border: 1.5px solid var(--line);
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.62);
      line-height: 1.6;
      white-space: normal;
      overflow: hidden;
    }

    .result.ok {
      background: var(--ok-bg);
      border-color: var(--ok-bd);
    }

    .result.err {
      background: var(--err-bg);
      border-color: var(--err-bd);
    }

    .meta {
      margin-top: 16px;
      color: var(--muted);
      text-align: center;
      font-size: 0.9rem;
    }

    .pill {
      display: inline-block;
      margin: 0 4px;
      padding: 2px 10px;
      border-radius: 999px;
      background: #f1e4d3;
      color: #654729;
      font-size: 0.84rem;
    }

    .table-wrap {
      margin-top: 8px;
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      -webkit-overflow-scrolling: touch;
      border-radius: 12px;
      border: 1px solid rgba(126, 97, 58, 0.2);
      background: rgba(255, 255, 255, 0.8);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 0;
      table-layout: fixed;
    }

    th,
    td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(126, 97, 58, 0.2);
      font-size: 0.96rem;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    th {
      font-weight: 600;
      color: #5e4425;
      background: rgba(236, 221, 201, 0.65);
    }

    th:nth-child(4),
    td:nth-child(4) {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .team-block {
      margin-top: 12px;
    }

    .team-title {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      color: #4f3a21;
    }

    .empty-row {
      text-align: center;
      color: #736255;
      font-style: italic;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .result-head {
      margin-bottom: 8px;
      color: #4f3a21;
      font-weight: 600;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      .card {
        padding: 58px 16px 18px;
        border-radius: 18px;
      }

      .search-row {
        flex-direction: column;
        align-items: stretch;
      }

      .search-row input,
      .search-row button {
        width: 100%;
      }

      .lang-toggle {
        top: 12px;
        right: 12px;
      }

      th,
      td {
        padding: 9px 10px;
        font-size: 0.9rem;
      }

      table {
        min-width: 0;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <button id="langToggle" class="lang-toggle" type="button">EN</button>
    <h1 id="title">ค้นหาหมายเลขโต๊ะของคุณในงาน</h1>
    <p id="subtitle" class="subtitle">พิมพ์ชื่อเพื่อค้นหาหมายเลขโต๊ะ</p>

    <div class="search-row">

      <button id="searchBtn" type="button">ค้นหา</button>
    </div>

    <section id="result" class="result" aria-live="polite"></section>
  </main>

    const data = rawGuestData
      .split("\n")
      .map((line) => line.trim())
      .filter(Boolean)
      .map((line) => {
        const columns = line.split(/\t+/).map((x) => x.trim()).filter(Boolean);

        if (columns.length >= 5) {
          const nickname = columns[0];
          const team = columns[1];
          const group = columns[2];
          const table = columns[3];
          const tableNumber = columns[4];
          return { nickname, team, group, table, tableNumber };
        }

        if (columns.length >= 3) {
          const nickname = columns[0];
          const group = columns[1];
          const tableNumber = columns[2];
          return {
            nickname,
            team: "-",
            group,
            table: "-",
            tableNumber
          };
        }

        const fallbackMatch = line.match(/^(.*)\s+([^\s].*)\s+(\d+)$/);
        if (fallbackMatch) {
          const [, nickname, group, tableNumber] = fallbackMatch;
          return {
            nickname: nickname.trim(),
            team: "-",
            group: group.trim(),
            table: "-",
            tableNumber: tableNumber.trim()
          };
        }

        return null;
      })
      .filter(Boolean);

    const nameInput = document.getElementById("name");
    const result = document.getElementById("result");
    const searchBtn = document.getElementById("searchBtn");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const langToggle = document.getElementById("langToggle");

    const i18n = {
      th: {
        pageTitle: "ค้นหาหมายเลขโต๊ะในงาน",
        title: "ค้นหาหมายเลขโต๊ะของคุณ",
        subtitle: "พิมพ์ชื่อเพื่อค้นหาหมายเลขโต๊ะ",
        placeholder: "ชื่อในระบบ เช่น real หรือ angel",
        searchBtn: "ค้นหา",
        toggle: "EN",
        initial: "",
        emptyInput: "กรุณากรอกชื่อก่อนค้นหา",
        notFound: "ไม่พบข้อมูลที่ตรงกับคำค้นหา",
        found: (count) => `พบข้อมูล ${count} รายการ`,
        teamGroom: "ทีมเจ้าบ่าว",
        teamBride: "ทีมเจ้าสาว",
        teamDoppio: "ทีม Doppio",
        noDataInTeam: "ไม่พบข้อมูลในทีมนี้",
        colName: "ชื่อ",
        colGroup: "กลุ่ม",
        colTable: "โต๊ะ",
        colTableNumber: "หมายเลขโต๊ะ"
      },
      en: {
        pageTitle: "Wedding Table Number Finder",
        title: "Find Your Table Number",
        subtitle: "Type your name to search",
        placeholder: "Name in system e.g. real or angel",
        searchBtn: "Search",
        toggle: "ไทย",
        initial: "",
        emptyInput: "Please enter a name before searching",
        notFound: "No matching records found",
        found: (count) => `Found ${count} result(s)`,
        teamGroom: "Groom Team",
        teamBride: "Bride Team",
        teamDoppio: "Doppio Team",
        noDataInTeam: "No data in this team",
        colName: "Name",
        colGroup: "Group",
        colTable: "Table",
        colTableNumber: "Table Number"
      }
    };

    let currentLang = "th";

    const normalize = (value) => value.trim().toLowerCase();

    function applyLanguage() {
      const t = i18n[currentLang];
      document.documentElement.lang = currentLang === "th" ? "th" : "en";
      document.title = t.pageTitle;
      title.textContent = t.title;
      subtitle.textContent = t.subtitle;
      nameInput.placeholder = t.placeholder;
      searchBtn.textContent = t.searchBtn;
      langToggle.textContent = t.toggle;
    }

    function showInitialState() {
      result.className = "result";
      result.textContent = i18n[currentLang].initial;
    }

    function search() {
      const input = normalize(nameInput.value);
      const t = i18n[currentLang];

      if (!input) {
        result.className = "result err";
        result.textContent = t.emptyInput;
        return;
      }

      const foundList = data.filter((x) => normalize(x.nickname).includes(input));

      if (foundList.length > 0) {
        const groomList = foundList.filter((x) => x.team === "เจ้าบ่าว");
        const brideList = foundList.filter((x) => x.team === "เจ้าสาว");
        const doppioList = foundList.filter((x) => normalize(x.team) === "doppio");

        const renderTeamTable = (title, list) => {
          const rows = list.length
            ? list
                .map(
                  (item) => `
                    <tr>
                      <td>${item.nickname}</td>
                      <td>${item.group}</td>
                      <td>${item.table}</td>
                      <td>${item.tableNumber}</td>
                    </tr>
                  `
                )
                .join("")
            : `
              <tr>
                <td colspan="4" class="empty-row">${t.noDataInTeam}</td>
              </tr>
            `;

          return `
            <section class="team-block">
              <p class="team-title">${title} (${list.length})</p>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>${t.colName}</th>
                      <th>${t.colGroup}</th>
                      <th>${t.colTable}</th>
                      <th>${t.colTableNumber}</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${rows}
                  </tbody>
                </table>
              </div>
            </section>
          `;
        };

        result.className = "result ok";
        result.innerHTML = `
          <div class="result-head">${t.found(foundList.length)}</div>
          ${renderTeamTable(t.teamGroom, groomList)}
          ${renderTeamTable(t.teamBride, brideList)}
          ${renderTeamTable(t.teamDoppio, doppioList)}
        `;
      } else {
        result.className = "result err";
        result.textContent = t.notFound;
      }
    }

    searchBtn.addEventListener("click", search);
    langToggle.addEventListener("click", () => {
      currentLang = currentLang === "th" ? "en" : "th";
      applyLanguage();

      if (nameInput.value.trim()) {
        search();
      } else {
        showInitialState();
      }
    });

    nameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        search();
      }
    });

    applyLanguage();
    showInitialState();
  </script>
